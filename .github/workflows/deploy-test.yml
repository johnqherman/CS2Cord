name: Deploy to Test Server

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish -c Release

      - name: Upload Files
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          rsync -avz \
            -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no -o IdentitiesOnly=yes" \
            bin/Release/net8.0/publish/CSSCord.dll \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/mnt/cs2/cs2-server/game/csgo/addons/counterstrikesharp/plugins/CSSCord/
          rm /tmp/deploy_key

      - name: Reload Plugin
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no -o IdentitiesOnly=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "RCON_PASSWORD=${{ secrets.RCON_PASSWORD }} /mnt/cs2/cs2-server/reload-plugins.sh CSSCord"
          rm /tmp/deploy_key
